<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Login - Analyzer</title>
    <style>
        :root {
            --bg-dark: #050510;
            --primary-glow: #00f2fe;
            --secondary-glow: #8e2de2;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--bg-dark); color: white; margin: 0; overflow: hidden; }
        
        .blob { position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.5; animation: float 10s ease-in-out infinite; }
        .blob-1 { top: -20%; left: -10%; width: 400px; height: 400px; background: var(--secondary-glow); }
        .blob-2 { bottom: -20%; right: -10%; width: 500px; height: 500px; background: var(--primary-glow); animation-delay: -5s; }
        @keyframes float { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-40px) scale(1.1); } }

        .login-card { background: rgba(20, 22, 35, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); padding: 45px 35px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); width: 340px; text-align: center; }
        h2 { margin-top: 0; background: linear-gradient(90deg, var(--primary-glow), #4facfe); -webkit-background-clip: text; background-clip: text; color: transparent; font-size: 28px; }
        input { width: 100%; padding: 15px; margin: 12px 0; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; background: rgba(0,0,0,0.4); color: white; font-size: 15px; transition: 0.3s; }
        input:focus { border-color: var(--primary-glow); outline: none; box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); background: rgba(0,0,0,0.6); }
        button { width: 100%; padding: 15px; background: linear-gradient(45deg, var(--secondary-glow), var(--primary-glow)); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4); }
        button:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(0, 242, 254, 0.6); }
        .error { color: #ff6b7b; background: rgba(220, 53, 69, 0.15); padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; border: 1px solid #dc3545; }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="login-card">
        <h2>🔐 Secure Access</h2>
        <p style="color: #94a3b8; font-size: 14px; margin-bottom: 25px;">Authenticate to access AI metrics</p>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Initialize Session</button>
        </form>
        <p style="margin-top: 25px; font-size: 12px; color: #64748b;">Credentials: admin / admin</p>
    </div>
</body>
</html>
